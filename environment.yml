name: tinyml-cancer-forget
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pytorch>=2.1
  - torchvision>=0.16
  - torchaudio
  - pytorch-cuda=12.1
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - scipy>=1.11
  - matplotlib>=3.7
  - seaborn>=0.12
  - pillow>=10.0
  - pyyaml>=6.0
  - tqdm>=4.65
  - pip:
      - timm>=0.9.12
      - onnx>=1.15
      - onnxruntime>=1.17
      - huggingface-hub>=0.23
      - tflite-runtime;platform_system!="Darwin"
