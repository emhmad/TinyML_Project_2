dataset:
  name: HAM10000
  root: ./data/ham10000/
  image_size: 224
  train_split: 0.8
  seed: 42
  num_workers: 0
  metadata_csv: ./data/ham10000/processed_metadata.csv
  max_train_samples: 128
  max_val_samples: 32

models:
  teacher: deit_small_patch16_224
  student: deit_tiny_patch16_224
  num_classes: 7
  pretrained: true

finetune:
  epochs: 1
  batch_size: 8
  lr: 1.0e-4
  weight_decay: 0.05
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 0
  use_weighted_loss: true

augmentation:
  resize_size: 256
  random_crop: 224
  horizontal_flip: true
  vertical_flip: true
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

pruning:
  criteria: [magnitude, wanda]
  sparsities: [0.5]
  calibration_size: 16
  exclude_layers:
    - head
    - cls_token
    - pos_embed
    - patch_embed.proj

nonuniform:
  target_avg_sparsity: 0.5
  bins:
    low_sensitivity: 0.7
    medium_sensitivity: 0.5
    high_sensitivity: 0.3

quantization:
  backend: fbgemm
  calibration_size: 32
  dtype: qint8

distillation:
  temperature: 4.0
  alpha: 0.7
  epochs: 1
  batch_size: 8
  lr: 1.0e-4
  weight_decay: 0.05
  optimizer: adamw
  scheduler: cosine

recovery:
  epochs: 1
  batch_size: 8
  lr: 1.0e-5
  weight_decay: 0.05
  optimizer: adamw
  scheduler: cosine
  criteria: [magnitude, wanda]
  sparsity: 0.5

evaluation:
  batch_size: 16
  latency_warmup_runs: 3
  latency_timed_runs: 10

smoke:
  e5_criteria: [magnitude]
  e5_groups: [mlp]

logging:
  results_dir: ./results/logs_smoke/
  checkpoints_dir: ./results/checkpoints_smoke/
  figures_dir: ./results/figures_smoke/
